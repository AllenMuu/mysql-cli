name: release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'dist/npm/**'
      - '.goreleaser.yml'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: GoReleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: check
      - name: npm wrapper tests
        working-directory: dist/npm
        run: node --test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v') && vars.NPM_PUBLISH == 'true'
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Set version from tag and publish
        working-directory: dist/npm
        run: |
          npm version "$(echo "${{ github.ref_name }}" | sed 's/^v//')" --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}